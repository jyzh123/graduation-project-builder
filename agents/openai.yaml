  short_description: "建议 Codex 使用的毕设、论文、课程设计一体化交付 skill。"
  default_prompt: "使用 $graduation-project-builder 处理毕设、毕业论文、课程设计和系统交付任务。任务开始先检查前置依赖和配套 skills：draw.io / diagrams.net、drawio-diagrams-enhanced、drawio-export-tools、Word / DOCX、officecli、Excel / XLSX、mermaid-diagram-specialist、humanizer-zh、humanizer、academic-writing-cs、imagegen、skill-installer，并按当前任务说明缺口或替代路径。所有会话默认授权多 agent，所有任务必须多 agent 并行执行，并且至少保留一个审核 agent，检查内容是否符合 skill 内部样式和限制要求，以及是否符合用户提供模板的样式和限制要求。"
policy:
  allow_implicit_invocation: true
